version: '3.8'

networks:
  nexysten_network:
    driver: bridge

services:

  db:
    image: postgres:16.1-alpine
    container_name: nexysten_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - nexysten_network
    restart: always
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: nexysten_redis
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - nexysten_network
    restart: always

volumes:
  postgres_data: